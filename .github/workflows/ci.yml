name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  macos-bundle:
    name: macOS Bundle Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup libclang for bindgen
        run: |
          brew install llvm
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "LIBCLANG_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=${LLVM_PREFIX}/lib:${DYLD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Setup CMake
        run: |
          brew install cmake
          echo "CMAKE=$(command -v cmake)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS app bundle
        run: pnpm tauri build --bundles app

      - name: Validate macOS app bundle
        run: |
          APP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -type d -print -quit)"
          test -n "$APP_PATH"
          plutil -lint "$APP_PATH/Contents/Info.plist"
          # Re-sign ad hoc in CI so verification checks the bundle contents
          # produced by this build instead of any transient partial signature.
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

  rust:
    name: Rust Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup CMake
        shell: pwsh
        run: |
          $cmake = "${env:ProgramFiles}\CMake\bin\cmake.exe"
          if (-not (Test-Path -LiteralPath $cmake)) {
            $cmake = (Get-Command cmake.exe -ErrorAction Stop).Source
          }
          "CMAKE=$cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $cmake --version

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test -j 1
